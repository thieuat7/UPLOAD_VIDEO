services:
  # 1. Container chạy PHP-FPM cho Laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    env_file:
      - ./src/.env
    volumes:
      - ./src:/var/www
    networks:
      - laravel_network

  # 2. Container Web Server Nginx
  web:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "${FORWARD_HTTP_PORT:-8000}:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel_network
    depends_on:
      - app

  # 3. Queue Worker (xử lý job / FFmpeg nén video)
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_queue
    restart: unless-stopped
    command: php /var/www/artisan queue:work --timeout=3600
    env_file:
      - ./src/.env
    volumes:
      - ./src:/var/www
    networks:
      - laravel_network
    depends_on:
      - app
      - db

  # 4. MySQL Database
  db:
    image: mysql:8.0
    container_name: laravel_db
    restart: unless-stopped
    env_file:
      - ./src/.env
    ports:
      - "${FORWARD_DB_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel_network

  # 5. MinIO (S3 local storage)
  minio:
    image: minio/minio
    container_name: laravel_minio
    restart: unless-stopped
    env_file:
      - ./src/.env
    ports:
      - "${FORWARD_MINIO_PORT:-9000}:9000"
      - "${FORWARD_MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - laravel_network

  # 6. Tự động khởi tạo Bucket và cấu hình quyền Public cho MinIO
  minio-init:
    image: minio/mc
    container_name: laravel_minio_init
    restart: "no"
    depends_on:
      - minio
    env_file:
      - ./src/.env
    networks:
      - laravel_network
    entrypoint: >
      sh -c "
        echo '⏳ Waiting for MinIO to start...';
        sleep 5;
        
        # Cấu hình kết nối local alias thông qua mạng nội bộ Docker (endpoint 'minio:9000')
        mc alias set local http://minio:9000 \$AWS_ACCESS_KEY_ID \$AWS_SECRET_ACCESS_KEY;
        
        # Kiểm tra và tạo bucket nếu chưa có (không ảnh hưởng nếu đã tồn tại)
        if ! mc ls local/\$AWS_BUCKET > /dev/null 2>&1; then
          echo '📁 Creating bucket: \$AWS_BUCKET...';
          mc mb local/\$AWS_BUCKET;
        else
          echo '✅ Bucket \$AWS_BUCKET already exists.';
        fi
        
        # Ép quyền Public (download) để sửa triệt để lỗi 403 trên trình duyệt
        echo '🔓 Setting bucket policy to public (download)...';
        mc anonymous set download local/\$AWS_BUCKET;
        
        echo '🏁 MinIO auto-configuration done!';
      "

  # 7. Khởi tạo Database (Key generate & Migrate)
  init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_init
    depends_on:
      - db
    env_file:
      - ./src/.env
    volumes:
      - ./src:/var/www
    networks:
      - laravel_network
    command: >
      sh -c "
        echo '⏳ Waiting for MySQL...';
        sleep 10;
        php artisan key:generate;
        php artisan migrate --force;
        echo '✅ Migration done!';
      "

# Networks
networks:
  laravel_network:
    driver: bridge

# Volumes
volumes:
  db_data:
  minio_data: